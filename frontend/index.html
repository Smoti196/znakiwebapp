<!DOCTYPE html>
<html>
<head>
    <title>ZNAKI DROGOWE</title>
<style>
body {
    font-family: Verdana;
    text-align: center;
    background: #111;
    color: white;
}

h2 {
    font-size: 32px;
}

#video {
    width: 90vw;
    max-width: 600px;
    border-radius: 20px;
    border: 3px solid #00ff99;
    margin-top: 10px;
}

button {
    font-size: 22px;
    padding: 15px 25px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: #00ff99;
    cursor: pointer;
}

button:hover {
    background: #00cc77;
}

#result {
    font-size: 28px;
    margin-top: 20px;
}
</style>
<style>
#result {
    font-size: 36px;
    font-weight: bold;
    margin-top: 20px;
    color: #00ff99;
}
</style>
</head>
<body>

<h2>KAMERKA AI</h2>

<video id="video" autoplay></video>
<br>
<button onclick="takePhoto()">Rozpoznaj znak</button>

<canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

<p id="result"></p>

<script>
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
})
    .then(stream => {
        video.srcObject = stream;
    });

async function takePhoto() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0, 320, 240);

    canvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append("file", blob, "photo.jpg");

        const res = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        document.getElementById("result").innerText =
            "AI: " + data.class + " (" + data.confidence + ")";
    }, "image/jpeg");
}
</script>

</body>
</html>
